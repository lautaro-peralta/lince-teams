<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WhisperFlow Teams</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%23191714'/><text x='16' y='23' font-family='Georgia' font-size='20' fill='%23f7f4ee' text-anchor='middle'>W</text></svg>">
</head>
<body>

<div id="auth-screen" class="auth-screen hidden">
  <div class="auth-card">
    <div class="auth-mast">
      <div class="auth-brand">WhisperFlow <em>Teams</em></div>
      <div class="rule-double"></div>
      <div class="auth-tagline">GESTIÓN DE EQUIPO · TRANSCRIPCIÓN DE VOZ · EN VUESTRO SERVIDOR</div>
    </div>
    <div class="auth-tabs">
      <button id="tab-login" class="tab active">Iniciar sesión</button>
      <span class="tab-sep">/</span>
      <button id="tab-register" class="tab">Crear cuenta</button>
    </div>
    <form id="auth-form">
      <div id="field-display" class="field hidden">
        <label>NOMBRE PARA MOSTRAR</label>
        <input id="in-display" type="text" placeholder="Lautaro" autocomplete="name">
      </div>
      <div class="field">
        <label>USUARIO</label>
        <input id="in-username" type="text" placeholder="lau" required autocomplete="username">
      </div>
      <div class="field">
        <label>CONTRASEÑA</label>
        <input id="in-password" type="password" placeholder="········" required autocomplete="current-password">
      </div>
      <p id="auth-error" class="auth-error"></p>
      <button type="submit" class="btn btn-primary btn-block" id="auth-submit">Entrar</button>
    </form>
  </div>
</div>

<div id="app" class="app hidden">
  <header class="masthead">
    <div class="brand">WhisperFlow <em>Teams</em></div>
    <nav class="mast-nav">
      <button class="nav-item active" data-view="dashboard">Panel</button>
      <button class="nav-item" data-view="board">Tablero</button>
      <button class="nav-item" data-view="transcripts">Transcripciones</button>
    </nav>
    <div class="mast-user">
      <span id="me-avatar" class="avatar"></span>
      <span id="me-name" class="user-name"></span>
      <button id="btn-logout" class="btn btn-small">Salir</button>
    </div>
  </header>
  <div class="rule-double rule-page"></div>
  <main id="main" class="main"></main>
</div>

<div id="modal-root"></div>
<div id="toast-root" class="toast-root"></div>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
