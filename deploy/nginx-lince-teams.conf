# Reverse proxy de nginx para Lince Teams (FastAPI + Whisper).
# Reemplazá teams-origin.TU-DOMINIO.com por tu subdominio real ANTES de usarlo.
#
# Este host es el "origen" al que apunta el Worker de Cloudflare que sirve
# /teams en el mismo dominio del panel (ver deploy/teams-proxy/ en el repo de
# Lince Automate). Dejá su registro DNS en "DNS only" (nube gris) para que el
# Worker lo alcance directo y para poder emitir el certificado con certbot.
#
# Instalar en la VM:
#   sudo cp /opt/lince-teams/deploy/nginx-lince-teams.conf /etc/nginx/sites-available/lince-teams
#   sudo ln -s /etc/nginx/sites-available/lince-teams /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d teams-origin.TU-DOMINIO.com   # agrega el 443 + TLS

# Necesario para el WebSocket: "Connection: upgrade" cuando hay Upgrade, si no
# "close". Va en el contexto http{} (sites-enabled ya se incluye ahí).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name teams-origin.TU-DOMINIO.com;

    # Audio de transcripción e imágenes de la pizarra: el default de nginx (1 MB)
    # es chico y las subidas fallarían con 413.
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket (/ws) — tiempo real de la pizarra:
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        # El WS queda abierto largo rato; sin esto nginx lo corta al minuto.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
