# Blueprint de Render: crea el backend con "New > Blueprint" apuntando al repo.
services:
  - type: web
    name: lince-teams
    runtime: docker
    plan: starter          # 512 MB (free) no alcanza para el modelo "small"; starter da 2 GB
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL   # cadena de conexión de Supabase (Session pooler)
        sync: false
      - key: LINCE_CORS_ORIGINS # p. ej. https://tu-frontend.vercel.app
        sync: false
      - key: LINCE_MODEL       # "base" en instancias justas de RAM; "small" con 2 GB
        value: small
      - key: LINCE_COMPUTE_TYPE
        value: int8
