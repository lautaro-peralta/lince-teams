name: Deploy Teams to OCI

on:
  push:
    branches:
      - master # Se dispara al mergear o pushear a master (rama default de este repo)

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to OCI via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            cd /opt/lince-teams
            # Deja la VM EXACTAMENTE en origin/master (descarta cambios locales;
            # data/, .env y teams.env quedan intactos por estar ignorados/afuera).
            git fetch origin master
            git checkout -f -B master origin/master
            # Es un servicio Python: reinstala deps en el venv (rápido si ya están).
            .venv/bin/pip install -r requirements-server.txt
            # Un solo worker: el hub del WebSocket y el modelo viven en el proceso.
            sudo systemctl restart lince-teams
